<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💙 Признание</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #e6f3ff 0%, #f0e6ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .pages-container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            position: relative;
        }

        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease-in-out;
            background: linear-gradient(135deg, #e6f3ff 0%, #f0e6ff 100%);
            overflow: hidden;
        }

        .page.active {
            opacity: 1;
            pointer-events: all;
        }

        .page-content {
            text-align: center;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            position: relative;
            z-index: 10;
        }

        /* Страница 1 */
        .page-1 .page-content {
            gap: 40px;
        }

        .cute-cat {
            width: 150px;
            height: auto;
            border-radius: 20px;
            animation: slideDown 1s ease-out;
            box-shadow: 0 10px 30px rgba(168, 213, 255, 0.3);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .text-block {
            margin-bottom: 20px;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bold-text {
            font-size: 36px;
            font-weight: bold;
            color: #6b9ebe;
            margin-bottom: 10px;
        }

        .small-text {
            font-size: 18px;
            color: #8db5d1;
        }

        /* Кнопки */
        .btn {
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            margin: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #a8d5ff 0%, #b8d5e8 100%);
            color: #5b7fa5;
            box-shadow: 0 4px 15px rgba(168, 213, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(168, 213, 255, 0.4);
        }

        .btn-yes {
            background: linear-gradient(135deg, #a8d5ff 0%, #b8d5e8 100%);
            color: #5b7fa5;
            box-shadow: 0 4px 15px rgba(168, 213, 255, 0.3);
        }

        .btn-yes:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(168, 213, 255, 0.4);
        }

        .btn-no {
            background: linear-gradient(135deg, #ffc8dd 0%, #ffe0ed 100%);
            color: #d978a0;
            box-shadow: 0 4px 15px rgba(255, 200, 221, 0.3);
            position: relative;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        /* Страница 2 */
        .page-2 h2 {
            font-size: 28px;
            color: #6b9ebe;
            margin-bottom: 20px;
        }

        .days-counter {
            font-size: 72px;
            font-weight: bold;
            color: #5b7fa5;
            animation: scaleIn 0.8s ease-out;
        }

        .days-counter span {
            display: block;
            font-size: 24px;
            color: #8db5d1;
            margin-top: 10px;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.5);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Страница 3 */
        .page-3 {
            position: relative;
        }

        .page-3 h2 {
            font-size: 28px;
            color: #6b9ebe;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 1.5s ease-out;
        }

        .hearts-container {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 1;
        }

        .heart {
            position: fixed;
            font-size: 40px;
            animation: floatHeartSlow 8s infinite ease-in;
            font-weight: bold;
            z-index: 1;
        }

        @keyframes floatHeartSlow {
            0% {
                opacity: 1;
                transform: translateY(0) translateX(0) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-600px) translateX(var(--tx)) rotate(360deg);
            }
        }

        /* Страница 4 */
        .page-4 h2 {
            font-size: 28px;
            color: #6b9ebe;
            margin-bottom: 15px;
        }

        .date-info {
            font-size: 20px;
            color: #8db5d1;
            margin-bottom: 30px;
        }

        /* Страница 5 */
        .jumping-cat {
            font-size: 100px;
            animation: jump 0.6s infinite;
            margin-bottom: 20px;
        }

        @keyframes jump {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-50px); }
        }

        .happy-meme {
            width: 200px;
            height: auto;
            border-radius: 20px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(168, 213, 255, 0.3);
        }

        .final-text {
            font-size: 20px;
            color: #8db5d1;
        }

        /* Адаптивность */
        @media (max-width: 600px) {
            .cute-cat {
                width: 120px;
            }
            
            .bold-text {
                font-size: 28px;
            }
            
            .days-counter {
                font-size: 48px;
            }
            
            .page-2 h2, .page-3 h2, .page-4 h2 {
                font-size: 24px;
            }
            
            .jumping-cat {
                font-size: 80px;
            }
            
            .happy-meme {
                width: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- Фоновая музыка -->
    <audio id="bgMusic" loop>
        <source src="https://assets.mixkit.co/active_storage/musics/44-44-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- Контейнер страниц -->
    <div class="pages-container">
        <!-- Страница 1 -->
        <div class="page page-1 active">
            <div class="page-content">
                <img src="https://images.unsplash.com/photo-1574158622682-e40e69881006?w=300" alt="cute cat" class="cute-cat">
                <div class="text-block">
                    <p class="bold-text">любимый</p>
                    <p class="small-text">это вновь я🥰</p>
                </div>
                <button class="btn btn-primary" onclick="goToPage(2)">что там?</button>
            </div>
        </div>

        <!-- Страница 2 -->
        <div class="page page-2">
            <div class="page-content">
                <h2>мы с тобой вместе уже</h2>
                <div class="days-counter">270 <span>дней</span></div>
                <button class="btn btn-primary" onclick="goToPage(3)">ого</button>
            </div>
        </div>

        <!-- Страница 3 -->
        <div class="page page-3">
            <div class="page-content">
                <h2 class="fade-in">все 270 дней ты делаешь мою жизнь лучше</h2>
                <div class="hearts-container"></div>
                <button class="btn btn-primary" onclick="goToPage(4)">клас</button>
            </div>
        </div>

        <!-- Страница 4 -->
        <div class="page page-4">
            <div class="page-content">
                <h2>приглашаю тебя на свидание</h2>
                <p class="date-info">09.07.2026 в 20:00</p>
                <div class="button-group">
                    <button class="btn btn-yes" onclick="goToPage(5)">я согласен</button>
                    <button class="btn btn-no" id="noBtn">не хочу</button>
                </div>
            </div>
        </div>

        <!-- Страница 5 -->
        <div class="page page-5">
            <div class="page-content">
                <div class="jumping-cat">🐱</div>
                <svg width="200" height="240" viewBox="0 0 200 240" class="happy-meme" style="max-width: 100%; height: auto;">
                    <!-- Head -->
                    <circle cx="100" cy="80" r="60" fill="white" stroke="black" stroke-width="4"/>
                    <!-- Left Eye -->
                    <circle cx="75" cy="70" r="20" fill="black"/>
                    <circle cx="79" cy="66" r="6" fill="white"/>
                    <!-- Right Eye -->
                    <circle cx="125" cy="70" r="20" fill="black"/>
                    <circle cx="129" cy="66" r="6" fill="white"/>
                    <!-- Heart in left eye -->
                    <path d="M 70 75 L 75 70 L 80 75 Q 75 80 70 75" fill="#FFB6D9"/>
                    <!-- Heart in right eye -->
                    <path d="M 120 75 L 125 70 L 130 75 Q 125 80 120 75" fill="#FFB6D9"/>
                    <!-- Left Wing -->
                    <ellipse cx="30" cy="90" rx="25" ry="35" fill="#FFD9E8" stroke="#6B4C7A" stroke-width="3"/>
                    <!-- Right Wing -->
                    <ellipse cx="170" cy="90" rx="25" ry="35" fill="#FFD9E8" stroke="#6B4C7A" stroke-width="3"/>
                    <!-- Body -->
                    <rect x="75" y="130" width="50" height="60" rx="10" fill="white" stroke="black" stroke-width="4"/>
                    <!-- Left Arm -->
                    <rect x="20" y="140" width="55" height="20" rx="10" fill="white" stroke="black" stroke-width="4"/>
                    <!-- Right Arm -->
                    <rect x="125" y="140" width="55" height="20" rx="10" fill="white" stroke="black" stroke-width="4"/>
                    <!-- Left Leg -->
                    <rect x="75" y="190" width="15" height="40" rx="7" fill="white" stroke="black" stroke-width="4"/>
                    <!-- Right Leg -->
                    <rect x="110" y="190" width="15" height="40" rx="7" fill="white" stroke="black" stroke-width="4"/>
                    <!-- Heart above -->
                    <path d="M 160 25 L 165 20 L 170 25 Q 165 30 160 25" fill="#FFB6D9"/>
                </svg>
                <p class="final-text">ура!! Буду ждать тебя в дискорде</p>
            </div>
        </div>
    </div>

    <script>
        // Запуск м��зыки при первом взаимодействии
        document.addEventListener('click', function initMusic() {
            const bgMusic = document.getElementById('bgMusic');
            if (bgMusic.paused) {
                bgMusic.volume = 0.3;
                bgMusic.play().catch(err => console.log('Музыка не может быть воспроизведена:', err));
            }
            document.removeEventListener('click', initMusic);
        }, { once: true });

        // Функция переключения страниц
        function goToPage(pageNum) {
            const pages = document.querySelectorAll('.page');
            pages.forEach(page => page.classList.remove('active'));
            
            const targetPage = document.querySelector(`.page-${pageNum}`);
            if (targetPage) {
                targetPage.classList.add('active');
                
                // Генерируем сердечки на странице 3
                if (pageNum === 3) {
                    generateHearts();
                }
            }
        }

        // Генерация сердечек по всей странице - медленная анимация
        function generateHearts() {
            const container = document.querySelector('.hearts-container');
            container.innerHTML = '';
            
            for (let i = 0; i < 20; i++) {
                const heart = document.createElement('div');
                heart.className = 'heart';
                heart.textContent = '❤️';
                
                const randomX = Math.random() * 400 - 200;
                const randomLeft = Math.random() * window.innerWidth;
                const randomDelay = Math.random() * 1.5;
                const randomDuration = 8 + Math.random() * 2;
                
                heart.style.setProperty('--tx', randomX + 'px');
                heart.style.left = randomLeft + 'px';
                heart.style.top = window.innerHeight + 'px';
                heart.style.animationDelay = randomDelay + 's';
                heart.style.animationDuration = randomDuration + 's';
                
                container.appendChild(heart);
            }
        }

        // Поведение кнопки "не хочу" - убегает
        const noBtn = document.getElementById('noBtn');
        if (noBtn) {
            noBtn.addEventListener('mouseover', function() {
                const randomX = Math.random() * 300 - 150;
                const randomY = Math.random() * 200 - 100;
                
                noBtn.style.position = 'relative';
                noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
                noBtn.style.transition = 'transform 0.3s ease-out';
            });

            noBtn.addEventListener('click', function(e) {
                e.preventDefault();
                return false;
            });
        }

        // Инициализация первой страницы
        window.addEventListener('load', function() {
            const firstPage = document.querySelector('.page-1');
            if (firstPage) {
                firstPage.classList.add('active');
            }
        });
    </script>
</body>
</html>
