<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💙 Любовь</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e6f3ff 0%, #f0e6ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            padding: 20px;
            text-align: center;
        }
        
        .page {
            display: none;
            animation: fadeIn 0.6s ease-in-out;
        }
        
        .page.active {
            display: block;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        img {
            max-width: 200px;
            height: auto;
            margin: 20px 0;
            border-radius: 15px;
        }
        
        h1 {
            color: #6b9ebe;
            margin: 20px 0;
            font-size: 32px;
        }
        
        p {
            color: #8db5d1;
            font-size: 18px;
            margin: 15px 0;
        }
        
        .counter {
            font-size: 64px;
            font-weight: bold;
            color: #5b7fa5;
            margin: 20px 0;
        }
        
        button {
            padding: 12px 30px;
            margin: 10px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #a8d5ff 0%, #b8d5e8 100%);
            color: #5b7fa5;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(168, 213, 255, 0.4);
        }
        
        .btn-no {
            background: linear-gradient(135deg, #ffc8dd 0%, #ffe0ed 100%);
            color: #d978a0;
        }
    </style>
</head>
<body>
    <audio id="music" loop style="display:none;">
        <source src="https://assets.mixkit.co/active_storage/musics/44-44-preview.mp3" type="audio/mpeg">
    </audio>
    
    <div class="container">
        <!-- Страница 1 -->
        <div class="page active" id="page1">
            <img src="https://images.unsplash.com/photo-1574158622682-e40e69881006?w=300" alt="кот">
            <h1>любимый</h1>
            <p>это вновь я 🥰</p>
            <button onclick="nextPage()">что там?</button>
        </div>
        
        <!-- Страница 2 -->
        <div class="page" id="page2">
            <h1>мы вместе уже</h1>
            <div class="counter">270<br><span style="font-size: 24px; color: #8db5d1;">дней</span></div>
            <button onclick="nextPage()">ого</button>
        </div>
        
        <!-- Страница 3 -->
        <div class="page" id="page3">
            <h1>все 270 дней<br>ты делаешь мою<br>жизнь лучше</h1>
            <p>❤️ ❤️ ❤️</p>
            <button onclick="nextPage()">клас</button>
        </div>
        
        <!-- Страница 4 -->
        <div class="page" id="page4">
            <h1>приглашаю тебя<br>на свидание</h1>
            <p>09.07.2026 в 20:00</p>
            <button onclick="nextPage()">я согласен</button>
            <button class="btn-no" onclick="alert('Ну давай! 💙')">не хочу</button>
        </div>
        
        <!-- Страница 5 -->
        <div class="page" id="page5">
            <p style="font-size: 80px;">🐱</p>
            <h1>ура!!</h1>
            <p>Буду ждать тебя в дискорде</p>
        </div>
    </div>
    
    <script>
        let currentPage = 1;
        
        document.addEventListener('click', () => {
            const music = document.getElementById('music');
            if (music.paused) {
                music.volume = 0.3;
                music.play().catch(e => console.log('Музыка:', e));
            }
        });
        
        function nextPage() {
            document.getElementById('page' + currentPage).classList.remove('active');
            currentPage++;
            document.getElementById('page' + currentPage).classList.add('active');
        }
    </script>
</body>
</html>
